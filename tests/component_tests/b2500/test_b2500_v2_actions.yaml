external_components:
  - source: COMPONENT_PATH
    refresh: 0s

wifi:
  ssid: "test"
  password: "12345678"

esp32:
  board: esp32dev

ble_client:
  mac_address: "00:00:00:00:00:00"

b2500:
  id: b2500_device
  generation: 2

logger:

esphome:
  name: test
  on_boot:
    then:
      - b2500.set_timer:
          id: b2500_device
          generation: 2
          timer: 1
          enabled: true
      - b2500.set_timer:
          id: b2500_device
          generation: 2
          timer: !lambda 'return 2;'
          start_hour: !lambda 'return 6;'
      - b2500.set_mqtt:
          id: b2500_device
          host: "broker.local"
          port: 1883
          username: "user"
          password: "pass"
      - b2500.set_datetime:
          id: b2500_device
          datetime:
            year: 2025
            month: 1
            day: 1
            hour: 0
            minute: 0
            second: 0

time:
  - platform: sntp
    id: sntp_time
